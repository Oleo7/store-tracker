<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Visits</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Header ── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-text h1  { font-size: 1.15rem; font-weight: 700; }
    .header-text p   { font-size: 0.75rem; opacity: 0.6; margin-top: 2px; }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }
    .back-btn:active { opacity: 0.7; }

    /* ── Filter bar ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      background: #fff;
      border-bottom: 1px solid #e8eaf0;
      position: sticky;
      top: 58px;
      z-index: 9;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #dde1ea;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }

    /* ── Store list ── */
    .list-body { padding: 12px 14px 40px; }

    .store-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .store-card:active { transform: scale(0.985); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .store-name { font-size: 1rem; font-weight: 700; }
    .store-area { font-size: 0.78rem; color: #777; margin-top: 2px; }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-Visited     { background: #d1fae5; color: #065f46; }
    .badge-Follow-up   { background: #fef3c7; color: #92400e; }
    .badge-Pending     { background: #e0e7ff; color: #3730a3; }
    .badge-Not-visited { background: #fee2e2; color: #991b1b; }

    .card-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #888;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .priority-High   { background: #ef4444; }
    .priority-Medium { background: #f59e0b; }
    .priority-Low    { background: #6b7280; }

    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* ── Detail view ── */
    .detail-body { padding: 16px 16px 40px; }

    .detail-hero {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .detail-hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .detail-store-name { font-size: 1.15rem; font-weight: 700; }
    .detail-area       { font-size: 0.8rem; color: #777; margin-top: 3px; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-top: 1px solid #f0f2f5;
      font-size: 0.84rem;
    }
    .info-row .label { color: #888; }
    .info-row a { color: #1a1a2e; text-decoration: none; font-weight: 600; }

    .section-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .status-opt {
      border: 2px solid #e8eaf0;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .status-opt.selected {
      border-color: #1a1a2e;
      background: #1a1a2e;
      color: #fff;
    }

    input[type="date"] {
      width: 100%;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    input[type="date"]:focus { border-color: #1a1a2e; }

    textarea {
      width: 100%;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      min-height: 100px;
    }
    textarea:focus { border-color: #1a1a2e; }

    .save-btn {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .save-btn:active  { opacity: 0.8; }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 30;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- ═══════════════ LIST VIEW ═══════════════ -->
<div class="view active" id="view-list">
  <div class="header">
    <div class="header-text">
      <h1>Store Visits</h1>
      <p id="subtitle">Loading stores...</p>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="All">All</button>
    <button class="filter-btn" data-filter="Visited">Visited</button>
    <button class="filter-btn" data-filter="Follow-up">Follow-up</button>
    <button class="filter-btn" data-filter="Pending">Pending</button>
    <button class="filter-btn" data-filter="Not visited">Not visited</button>
  </div>

  <div class="list-body" id="store-list">
    <div class="state-msg">Loading...</div>
  </div>
</div>

<!-- ═══════════════ DETAIL VIEW ═══════════════ -->
<div class="view" id="view-detail">
  <div class="header">
    <button class="back-btn" id="back-btn">&#8592;</button>
    <div class="header-text">
      <h1 id="d-header-name"></h1>
      <p id="d-header-area"></p>
    </div>
  </div>

  <div class="detail-body">

    <!-- Store info -->
    <div class="detail-hero">
      <div class="detail-hero-top">
        <div>
          <div class="detail-store-name" id="d-name"></div>
          <div class="detail-area" id="d-area"></div>
        </div>
        <span class="badge" id="d-badge"></span>
      </div>
      <div class="info-row">
        <span class="label">Contact</span>
        <span id="d-contact">—</span>
      </div>
      <div class="info-row">
        <span class="label">Phone</span>
        <a href="#" id="d-phone">—</a>
      </div>
      <div class="info-row">
        <span class="label">Last visited</span>
        <span id="d-last-visited">—</span>
      </div>
    </div>

    <!-- Status -->
    <div class="section-card">
      <div class="section-label">Status</div>
      <div class="status-grid">
        <div class="status-opt" data-s="Visited">Visited</div>
        <div class="status-opt" data-s="Follow-up">Follow-up</div>
        <div class="status-opt" data-s="Pending">Pending</div>
        <div class="status-opt" data-s="Not visited">Not visited</div>
      </div>
    </div>

    <!-- Next follow-up -->
    <div class="section-card">
      <div class="section-label">Next Follow-up</div>
      <input type="date" id="d-followup" />
    </div>

    <!-- Notes -->
    <div class="section-card">
      <div class="section-label">Notes</div>
      <textarea id="d-notes" placeholder="Add notes about this visit..."></textarea>
    </div>

    <button class="save-btn" id="save-btn">Save Changes</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = "";

  let stores = [];
  let activeFilter = "All";
  let currentStore = null;

  // ── Load stores ──
  async function loadStores() {
    try {
      const res = await fetch(`${API}/stores`);
      stores = await res.json();
      renderList();
    } catch {
      document.getElementById("store-list").innerHTML =
        '<div class="state-msg">Could not connect to server.</div>';
    }
  }

  // ── Render list ──
  function renderList() {
    const list = document.getElementById("store-list");
    const filtered = activeFilter === "All"
      ? stores
      : stores.filter(s => s.status === activeFilter);

    const visited = stores.filter(s => s.status === "Visited").length;
    document.getElementById("subtitle").textContent =
      `${visited} of ${stores.length} visited`;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="state-msg">No stores match this filter.</div>';
      return;
    }

    list.innerHTML = filtered.map(s => `
      <div class="store-card" data-row="${s.row}">
        <div class="card-top">
          <div>
            <div class="store-name">${esc(s.store_name)}</div>
            <div class="store-area">${esc(s.area)}</div>
          </div>
          <span class="badge badge-${s.status.replace(/ /g,'-')}">${esc(s.status)}</span>
        </div>
        <div class="card-meta">
          <span>
            <span class="priority-dot priority-${s.priority}"></span>
            ${esc(s.priority)} priority
          </span>
          ${s.last_visited  ? `<span>Last: ${esc(s.last_visited)}</span>`  : ""}
          ${s.next_followup ? `<span>Next: ${esc(s.next_followup)}</span>` : ""}
        </div>
      </div>
    `).join("");

    list.querySelectorAll(".store-card").forEach(card => {
      card.addEventListener("click", () => openDetail(Number(card.dataset.row)));
    });
  }

  // ── Filters ──
  document.getElementById("filters").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderList();
  });

  // ── Open detail page ──
  function openDetail(row) {
    currentStore = stores.find(s => s.row === row);
    if (!currentStore) return;

    const s = currentStore;
    document.getElementById("d-header-name").textContent = s.store_name;
    document.getElementById("d-header-area").textContent = s.area;
    document.getElementById("d-name").textContent = s.store_name;
    document.getElementById("d-area").textContent = s.area;

    const badge = document.getElementById("d-badge");
    badge.textContent = s.status;
    badge.className = `badge badge-${s.status.replace(/ /g, '-')}`;

    document.getElementById("d-contact").textContent = s.contact || "—";

    const phoneEl = document.getElementById("d-phone");
    if (s.phone) {
      phoneEl.textContent = s.phone;
      phoneEl.href = `tel:${s.phone}`;
    } else {
      phoneEl.textContent = "—";
      phoneEl.href = "#";
    }

    document.getElementById("d-last-visited").textContent = s.last_visited || "—";
    document.getElementById("d-followup").value = s.next_followup || "";
    document.getElementById("d-notes").value = s.notes || "";

    document.querySelectorAll(".status-opt").forEach(opt => {
      opt.classList.toggle("selected", opt.dataset.s === s.status);
    });

    showView("detail");
  }

  // ── Back button ──
  document.getElementById("back-btn").addEventListener("click", () => {
    currentStore = null;
    showView("list");
  });

  // ── Status options ──
  document.querySelectorAll(".status-opt").forEach(opt => {
    opt.addEventListener("click", () => {
      document.querySelectorAll(".status-opt").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
    });
  });

  // ── Save ──
  document.getElementById("save-btn").addEventListener("click", async () => {
    if (!currentStore) return;
    const btn = document.getElementById("save-btn");
    const selectedStatus = document.querySelector(".status-opt.selected")?.dataset.s;

    const payload = {
      status: selectedStatus,
      notes: document.getElementById("d-notes").value,
      next_followup: document.getElementById("d-followup").value,
    };

    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const res = await fetch(`${API}/stores/${currentStore.row}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (data.ok) {
        Object.assign(currentStore, {
          status: payload.status,
          notes: payload.notes,
          next_followup: payload.next_followup,
        });
        if (payload.status === "Visited") {
          currentStore.last_visited = new Date().toISOString().slice(0, 10);
          document.getElementById("d-last-visited").textContent = currentStore.last_visited;
        }
        // Update badge on detail page
        const badge = document.getElementById("d-badge");
        badge.textContent = payload.status;
        badge.className = `badge badge-${payload.status.replace(/ /g, '-')}`;

        renderList();
        showToast("Saved!");
      } else {
        showToast("Save failed. Try again.");
      }
    } catch {
      showToast("Network error. Try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Save Changes";
    }
  });

  // ── View switching ──
  function showView(name) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById(`view-${name}`).classList.add("active");
    window.scrollTo(0, 0);
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  // ── Utils ──
  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  loadStores();
</script>
</body>
</html>
